<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Escolar com IA</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        body.light {
            background: #f4f4f4;
            color: #000;
        }

        body.light .container {
            background: #fff;
        }

        body.light input,
        body.light select,
        body.light textarea {
            background: #fff;
            color: #000;
            border: 1px solid #ccc;
        }

        body.light .resposta {
            background: #e9ecef;
        }

        body.dark {
            background: #121212;
            color: #fff;
        }

        body.dark .container {
            background: #1e1e1e;
        }

        body.dark input,
        body.dark select,
        body.dark textarea {
            background: #2c2c2c;
            color: #fff;
            border: 1px solid #444;
        }

        body.dark .resposta {
            background: #2c2c2c;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .toggle {
            flex: 0;
            cursor: pointer;
            font-size: 20px;
            border: none;
            background: none;
            color: inherit;
            width: 30px;
            padding: 0px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .botoes {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            border: none;
            cursor: pointer;
        }

        button.enviar {
            background-color: #28a745;
            color: white;
            font-weight: bold;
        }

        button.limpar {
            background-color: #dc3545;
            color: white;
            font-weight: bold;
        }

        .resposta {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* 🔥 LOADER */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #ccc;
            border-top: 6px solid #28a745;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="light">

    <!-- 🔒 OVERLAY -->
    <div class="overlay" id="overlay">
        <div class="spinner"></div>
    </div>

    <div class="container">

        <div class="top-bar">
            <span></span>
            <h2>Estude Comigo IA</h2>
            <button class="toggle" onclick="toggleTheme()">🌙</button>
        </div>

        <div class="form">
            <label>Google API Key:</label>
            <input type="password" id="apiKey" placeholder="Cole sua API key do Google" value="AIzaSyClv2HV3sHR9SSxs1Y-rfDSCZ0LwrQ3uiE">

            <label>Escolha a disciplina:</label>
            <select id="disciplina">
                <option value="Biologia">Biologia</option>
                <option value="Ciências">Ciências</option>
                <option value="Física">Física</option>
                <option value="Geografia">Geografia</option>
                <option value="História">História</option>
                <option value="Matemática" selected>Matemática</option>
                <option value="Português">Português</option>
                <option value="Química">Química</option>
                <option value="Redação">Redação</option>
            </select>

            <label>Faça sua pergunta:</label>
            <textarea id="pergunta" placeholder="Digite sua pergunta..."></textarea>

            <div class="botoes">
                <button class="enviar" onclick="enviarPergunta()">Enviar</button>
                <button class="limpar" onclick="limparCampos()">Limpar</button>
            </div>
        </div>

        <div class="resposta" id="resposta"></div>

    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains("dark");

            if (isDark) {
                body.classList.remove("dark");
                body.classList.add("light");
                localStorage.setItem("theme", "light");
            } else {
                body.classList.remove("light");
                body.classList.add("dark");
                localStorage.setItem("theme", "dark");
            }
        }

        function toggleLoader(show) {
            document.getElementById("overlay").style.display = show ? "flex" : "none";
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem("theme") || "light";
            document.body.classList.remove("light", "dark");
            document.body.classList.add(savedTheme);

            const campoPergunta = document.getElementById("pergunta");

            campoPergunta.addEventListener("keydown", function (event) {
                if (event.key === "Enter" && !event.shiftKey) {
                    event.preventDefault();
                    enviarPergunta();
                }
            });
        };

        function limparCampos() {
            document.getElementById("pergunta").value = "";
            document.getElementById("resposta").innerText = "";
        }

        async function enviarPergunta() {
            const apiKey = document.getElementById("apiKey").value;
            const disciplina = document.getElementById("disciplina").value;
            const pergunta = document.getElementById("pergunta").value;
            const respostaDiv = document.getElementById("resposta");

            if (!apiKey.trim()) {
                respostaDiv.innerText = "Informe a API Key.";
                return;
            }

            if (!pergunta.trim()) {
                respostaDiv.innerText = "Escreva uma pergunta.";
                return;
            }

            toggleLoader(true);

            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            contents: [
                                {
                                    parts: [
                                        {
                                            text: `Restrições: Só responda perguntas relacionadas à disciplina selecionada;\nDisciplina: ${disciplina}\nPergunta: ${pergunta}`
                                        }
                                    ]
                                }
                            ]
                        })
                    }
                );

                const data = await response.json();

                if (data.error) {
                    respostaDiv.innerText = "Erro: " + data.error.message;
                    return;
                }

                const texto = data.candidates[0].content.parts[0].text;
                respostaDiv.innerText = texto;

            } catch (error) {
                respostaDiv.innerText = "Erro ao conectar com a IA.";
                console.error(error);
            } finally {
                toggleLoader(false); // 🔥 SEMPRE desbloqueia
            }
        }
    </script>

</body>

</html>
